<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TikSave Pro - Download TikTok Videos</title>
<meta name="description" content="The fastest TikTok downloader. No watermark. No login. Free."/>
<link rel="manifest" href="/manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
      colors: {
        tik: { red: '#FE2C55', cyan: '#25F4EE', dark: '#000000', surface: '#1C1C1E', muted: '#8A8B91', border: '#3A3A3C' }
      },
      borderRadius: { none: '0px', sm: '0px', md: '0px', lg: '0px', xl: '0px', '2xl': '0px', '3xl': '0px', full: '0px' }
    }
  }
};
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
  body { font-family: 'DM Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; min-height: 100vh; padding-bottom: 70px; }
  .btn { min-height: 52px; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: all 0.2s ease; cursor: pointer; border: none; outline: none; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #FE2C55; color: #fff; }
  .btn-primary:hover { background: #E0284D; }
  .btn-secondary { background: #2C2C2E; border: 1px solid #3A3A3C; color: #fff; }
  .btn-cyan { background: #2C2C2E; border: 1px solid #25F4EE; color: #25F4EE; }
  .btn-ghost { background: transparent; border: 1px solid #3A3A3C; color: #8A8B91; }
  .input-field { min-height: 52px; background: #1C1C1E; border: 1px solid #3A3A3C; color: #fff; padding: 0 16px; width: 100%; outline: none; font-size: 16px; }
  .input-field:focus { border-color: #FE2C55; }
  
  /* Views */
  .view-section { display: none; }
  .view-section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #000; border-top: 1px solid #3A3A3C; display: flex; justify-content: space-around; align-items: center; z-index: 50; }
  .nav-item { color: #8A8B91; display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: 500; }
  .nav-item.active { color: #fff; }

  /* Loader */
  .loader { width: 40px; height: 40px; border: 3px solid #FE2C55; border-bottom-color: #25F4EE; border-radius: 50% !important; display: inline-block; animation: rotation 1s linear infinite; }
  @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; font-weight: 700; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .toast.show { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<!-- Header -->
<header class="sticky top-0 h-16 bg-tik-dark border-b border-tik-border flex items-center justify-between px-4 z-40">
  <div class="flex items-center gap-2">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FE2C55" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3" fill="#FE2C55"/><circle cx="18" cy="16" r="3" fill="#25F4EE"/></svg>
    <span class="text-xl font-bold tracking-tight">TikSave Pro</span>
  </div>
</header>

<!-- Main App Views -->
<main class="p-4 max-w-md mx-auto">
  
  <!-- HOME VIEW -->
  <div id="view-home" class="view-section active">
    <div class="text-center my-6">
      <h1 class="text-3xl font-bold mb-2">Download TikTok Videos</h1>
      <p class="text-sm text-tik-cyan font-medium">No watermark • No login • Free forever</p>
    </div>

    <!-- URL Input -->
    <div class="bg-tik-surface p-4 mb-6 border border-tik-border">
      <div class="relative flex items-center mb-2">
        <input type="url" id="urlInput" class="input-field pr-20" placeholder="Paste TikTok URL here..." autocomplete="off"/>
        <button onclick="pasteFromClipboard()" class="absolute right-2 text-tik-cyan font-bold text-sm px-2 py-1 bg-tik-dark border border-tik-border">PASTE</button>
      </div>
      <div id="urlStatus" class="text-xs mb-4 min-h-[16px]"></div>
      
      <button id="btnAnalyze" onclick="handleAnalyze()" class="btn btn-primary w-full text-lg tracking-wide">ANALYZE VIDEO</button>
    </div>

    <!-- Loading State -->
    <div id="stateLoading" class="hidden bg-tik-surface p-8 text-center border border-tik-border mb-6">
      <span class="loader mb-4"></span>
      <p id="loadingMsg" class="font-medium text-tik-cyan">Connecting to TikTok servers...</p>
      <div class="w-full bg-tik-dark h-1 mt-4 overflow-hidden relative">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-tik-red to-tik-cyan w-1/2 animate-pulse"></div>
      </div>
    </div>

    <!-- Result State -->
    <div id="stateResult" class="hidden">
      <!-- Thumbnail -->
      <div class="relative w-full aspect-video bg-tik-dark mb-4 border border-tik-border overflow-hidden group">
        <img id="resThumb" src="" class="w-full h-full object-cover" alt="Thumbnail"/>
        <div class="absolute inset-0 bg-black/50 flex items-center justify-center">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      
      <!-- Info -->
      <div class="mb-4">
        <h2 id="resTitle" class="text-base font-bold line-clamp-2 mb-1">Video Title</h2>
        <div class="flex justify-between text-tik-muted text-sm">
          <span id="resAuthor">@author</span>
          <span id="resDuration">0:00</span>
        </div>
      </div>
      <hr class="border-tik-border mb-4"/>

      <!-- Quality Tabs -->
      <div class="flex border-b border-tik-border mb-4">
        <button class="flex-1 py-2 text-center text-tik-red border-b-2 border-tik-red font-bold text-sm">HD</button>
        <button class="flex-1 py-2 text-center text-tik-muted text-sm font-medium">SD</button>
      </div>

      <!-- Download Buttons -->
      <div class="flex flex-col gap-3">
        <button id="dlHD" onclick="download('hd')" class="btn btn-primary w-full justify-between px-4">
          <span class="flex items-center gap-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> DOWNLOAD HD VIDEO</span>
          <span class="text-xs bg-black/30 px-2 py-1 text-tik-cyan font-bold">NO WATERMARK</span>
        </button>
        
        <button id="dlSD" onclick="download('sd')" class="btn btn-secondary w-full justify-start px-4">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> DOWNLOAD SD VIDEO
        </button>

        <button id="dlAudio" onclick="download('audio')" class="btn btn-cyan w-full justify-between px-4">
          <span class="flex items-center gap-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> DOWNLOAD AUDIO</span>
          <span class="text-xs">MP3</span>
        </button>

        <button id="dlWatermark" onclick="download('watermark')" class="btn btn-ghost w-full">
          DOWNLOAD WITH WATERMARK
        </button>
      </div>

      <!-- Share -->
      <div class="flex gap-2 mt-4">
        <button onclick="copyLink()" class="btn btn-secondary flex-1 text-sm">COPY LINK</button>
        <button onclick="shareLink()" class="btn btn-secondary flex-1 text-sm">SHARE</button>
      </div>
      
      <button onclick="resetHome()" class="mt-6 text-tik-muted text-sm w-full text-center underline font-medium">Download another video</button>
    </div>

    <!-- Batch (Collapsible) -->
    <div class="mt-8 border border-tik-border bg-tik-surface">
      <button onclick="document.getElementById('batchPanel').classList.toggle('hidden')" class="w-full p-4 flex justify-between items-center font-bold">
        BATCH DOWNLOAD (Up to 5)
        <span class="text-tik-red">▼</span>
      </button>
      <div id="batchPanel" class="hidden p-4 border-t border-tik-border">
        <textarea id="batchInput" class="input-field py-3 min-h-[120px] mb-3" placeholder="Paste up to 5 URLs (one per line)"></textarea>
        <button onclick="handleBatch()" class="btn btn-secondary w-full text-sm">ANALYZE ALL</button>
        <div id="batchResults" class="mt-4 flex flex-col gap-2"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view-section">
    <h2 class="text-xl font-bold mb-4">Download History</h2>
    <div id="historyList" class="flex flex-col gap-3"></div>
    <button onclick="clearHistory()" class="btn btn-ghost w-full mt-6 text-sm">CLEAR HISTORY</button>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="view-section">
    <h2 class="text-xl font-bold mb-4">Settings</h2>
    <div class="bg-tik-surface border border-tik-border flex flex-col">
      <div class="p-4 border-b border-tik-border flex justify-between items-center">
        <span>Save History</span>
        <input type="checkbox" id="settingHistory" checked class="w-5 h-5 accent-tik-red" onchange="toggleSetting('history')"/>
      </div>
      <div class="p-4 flex justify-between items-center" id="pwaInstallWrap" style="display:none">
        <span>Install App</span>
        <button id="pwaInstallBtn" class="bg-tik-red text-white px-4 py-1 text-sm font-bold">INSTALL</button>
      </div>
    </div>
    <div class="text-center text-tik-muted text-xs mt-6">TikSave Pro v2.0.0</div>
  </div>

</main>

<!-- Footer Stats -->
<div class="fixed bottom-[60px] left-0 right-0 bg-tik-dark/90 backdrop-blur border-t border-tik-border p-2 text-center text-xs text-tik-muted z-30 flex justify-between px-4 items-center">
  <span id="footerStats">🔥 0 downloaded today</span>
  <span>Free forever</span>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button onclick="switchView('home')" id="nav-home" class="nav-item active">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="mt-1">Home</span>
  </button>
  <button onclick="switchView('history'); renderHistory();" id="nav-history" class="nav-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="mt-1">History</span>
  </button>
  <button onclick="switchView('settings')" id="nav-settings" class="nav-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span class="mt-1">Settings</span>
  </button>
</nav>

<div id="toast" class="toast">Message</div>

<script>
const API_BASE = ''; 
let currentData = null;
let historyData = JSON.parse(localStorage.getItem('tiksave_history') || '[]');
const TIKTOK_REGEX = /^https?:\/\/(www\.|vm\.|vt\.|m\.)?tiktok\.com\/.+/i;

const el = id => document.getElementById(id);

// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  el('pwaInstallWrap').style.display = 'flex';
});
el('pwaInstallBtn')?.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') el('pwaInstallWrap').style.display = 'none';
    deferredPrompt = null;
  }
});

// UI Routing
function switchView(view) {
  ['home', 'history', 'settings'].forEach(v => {
    el(`view-${v}`).classList.remove('active');
    el(`nav-${v}`).classList.remove('active');
  });
  el(`view-${view}`).classList.add('active');
  el(`nav-${view}`).classList.add('active');
  window.scrollTo(0, 0);
}

// Input Validation
el('urlInput').addEventListener('input', (e) => {
  const val = e.target.value.trim();
  const st = el('urlStatus');
  if(!val) { st.textContent = ''; return; }
  if(TIKTOK_REGEX.test(val)) { st.innerHTML = '<span class="text-green-500">✓ Valid TikTok URL detected</span>'; }
  else { st.innerHTML = '<span class="text-tik-red">✗ Invalid link</span>'; }
});

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) { el('urlInput').value = text; el('urlInput').dispatchEvent(new Event('input')); }
  } catch { showToast('Clipboard access denied'); }
}

function showToast(msg) {
  const t = el('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Main Fetch
async function handleAnalyze() {
  const url = el('urlInput').value.trim();
  if(!url || !TIKTOK_REGEX.test(url)) return showToast('Please enter a valid TikTok link');

  el('btnAnalyze').parentElement.classList.add('hidden');
  el('stateLoading').classList.remove('hidden');

  const msgs = ['Connecting to TikTok servers...', 'Extracting video data...', 'Preparing download links...', 'Almost ready...'];
  let c = 0; const tmr = setInterval(() => el('loadingMsg').textContent = msgs[++c % msgs.length], 1500);

  try {
    const res = await fetch(`${API_BASE}/api/fetch`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url })
    });
    const data = await res.json();
    if(!res.ok || !data.success) throw new Error(data.error || 'Failed');
    
    currentData = data;
    renderResult(data);
    addToHistory(data);
    
  } catch(e) {
    showToast(e.message);
    resetHome();
  } finally {
    clearInterval(tmr);
  }
}

function renderResult(data) {
  el('stateLoading').classList.add('hidden');
  el('stateResult').classList.remove('hidden');
  
  el('resThumb').src = data.thumbnail || '';
  el('resTitle').textContent = data.title || 'TikTok Video';
  el('resAuthor').textContent = data.author || '@unknown';
  el('resDuration').textContent = data.duration || '0:00';
  
  if(!data.downloads.audio?.url) el('dlAudio').style.display = 'none';
  else el('dlAudio').style.display = 'flex';
}

function resetHome() {
  el('stateLoading').classList.add('hidden');
  el('stateResult').classList.add('hidden');
  el('urlInput').value = '';
  el('urlStatus').textContent = '';
  el('btnAnalyze').parentElement.classList.remove('hidden');
}

// Download
function download(type) {
  if(!currentData) return;
  const urls = currentData.downloads;
  const target = urls[type]?.url;
  if(!target) return showToast('Link not available');
  
  const ext = type === 'audio' ? 'mp3' : 'mp4';
  const dlUrl = `${API_BASE}/api/download?url=${encodeURIComponent(target)}&filename=tiksave-${type}.${ext}&type=${type === 'audio'?'audio/mpeg':'video/mp4'}`;
  
  showToast('Starting download...');
  const a = document.createElement('a');
  a.href = dlUrl; a.download = '';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// History
function addToHistory(data) {
  if(!el('settingHistory').checked) return;
  const item = { url: el('urlInput').value, title: data.title, thumb: data.thumbnail, date: Date.now() };
  historyData = [item, ...historyData.filter(h => h.url !== item.url)].slice(0, 10);
  localStorage.setItem('tiksave_history', JSON.stringify(historyData));
}

function renderHistory() {
  const list = el('historyList');
  if(!historyData.length) { list.innerHTML = '<p class="text-tik-muted text-sm text-center py-4">No history yet</p>'; return; }
  
  list.innerHTML = historyData.map(h => `
    <div class="flex gap-3 bg-tik-surface border border-tik-border p-2">
      <img src="${h.thumb}" class="w-16 h-20 object-cover bg-tik-dark"/>
      <div class="flex-1 min-w-0 flex flex-col justify-center">
        <div class="text-sm font-bold line-clamp-2 mb-1">${h.title}</div>
        <div class="text-xs text-tik-muted mb-2">${new Date(h.date).toLocaleDateString()}</div>
        <button onclick="reAnalyze('${h.url}')" class="text-xs bg-tik-red text-white py-1 px-2 font-bold w-max">DOWNLOAD</button>
      </div>
    </div>
  `).join('');
}

function reAnalyze(url) {
  switchView('home');
  el('urlInput').value = url;
  el('urlInput').dispatchEvent(new Event('input'));
  handleAnalyze();
}

function clearHistory() { historyData = []; localStorage.removeItem('tiksave_history'); renderHistory(); showToast('History cleared'); }

// Settings
function toggleSetting(key) {
  if(key === 'history') {
    if(!el('settingHistory').checked) clearHistory();
  }
}

// Utils
function copyLink() {
  if(!currentData) return;
  const link = currentData.downloads.hd?.url || currentData.downloads.sd?.url;
  navigator.clipboard.writeText(link).then(() => showToast('Link copied!'));
}

function shareLink() {
  if(navigator.share && currentData) {
    navigator.share({ title: currentData.title, text: 'Download TikTok Video', url: currentData.downloads.hd?.url || '' });
  } else showToast('Share not supported');
}

// Batch 
async function handleBatch() {
  const lines = el('batchInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length) return;
  if(lines.length > 5) return showToast('Max 5 URLs allowed');
  
  el('batchResults').innerHTML = '<div class="text-sm text-tik-cyan flex items-center gap-2"><span class="loader border-2 border-r-transparent w-4 h-4"></span> Processing batch...</div>';
  
  try {
    const res = await fetch(`${API_BASE}/api/batch`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({urls: lines}) });
    const data = await res.json();
    if(!data.success) throw new Error(data.error);
    
    el('batchResults').innerHTML = data.results.map(r => `
      <div class="bg-tik-dark border border-tik-border p-2 text-sm flex justify-between items-center">
        <span class="truncate pr-2">${r.title || r.url}</span>
        ${r.success 
          ? `<a href="${API_BASE}/api/download?url=${encodeURIComponent(r.downloads.hd?.url || r.downloads.sd?.url)}&filename=batch.mp4" class="text-tik-cyan font-bold min-w-max">GET MP4</a>` 
          : `<span class="text-tik-red min-w-max">ERROR</span>`}
      </div>
    `).join('');
  } catch(e) {
    el('batchResults').innerHTML = `<div class="text-tik-red text-sm">${e.message}</div>`;
  }
}

// Stats Polling
async function pollStats() {
  try {
    const r = await fetch(`${API_BASE}/api/health`);
    const d = await r.json();
    if(d.stats?.today !== undefined) el('footerStats').textContent = `🔥 ${d.stats.today} downloaded today`;
  } catch(e){}
}
pollStats(); setInterval(pollStats, 30000);

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}
</script>
</body>
</html>
